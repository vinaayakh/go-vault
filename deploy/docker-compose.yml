services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vault_root
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD:-devpassword}
      POSTGRES_DB: vault
      # Init script creates the least-privilege app role.
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vault_root -d vault"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
