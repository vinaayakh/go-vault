# Phase 0 · task 0.4 + 0.7 — CI security pipeline.
#
# Pipeline-first DevSecOps: this workflow is the server-side backstop to the local
# pre-commit hooks (.pre-commit-config.yaml). Every later phase is built against a
# green, security-enforcing CI.
#
# SUPPLY-CHAIN RULE: every `uses:` action is pinned by full commit SHA (not a tag),
# with a trailing `# vX.Y.Z` comment for readability. Refresh with the SHA the tag
# currently points to (`git ls-remote https://github.com/<repo> refs/tags/<tag>`).
#
# Jobs: build-test · lint(gosec) · vuln(govulncheck) · sast(CodeQL) · semgrep ·
#       secrets(gitleaks) · sbom(syft) · web(eslint+build) · docker-scan(Trivy).

name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default; individual jobs elevate only what they need.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build & test (race)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...
      - run: go test -race ./...

  integration-test:
    name: integration tests (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vault_root
          POSTGRES_PASSWORD: cipassword
          POSTGRES_DB: vault_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vault_root -d vault_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_SUPERUSER_URL: postgres://vault_root:cipassword@localhost:5432/vault_test?sslmode=disable
      TEST_DATABASE_URL: postgres://vault_root:cipassword@localhost:5432/vault_test?sslmode=disable
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Install golang-migrate CLI
        run: |
          curl -sSfL https://github.com/golang-migrate/migrate/releases/download/v4.19.1/migrate.linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin migrate
      - name: Run migrations
        run: migrate -path migrations -database "$DATABASE_SUPERUSER_URL" up
      - name: Run integration tests
        run: go test -race -tags integration ./internal/storage/...

  lint:
    name: golangci-lint (gosec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false # golangci-lint-action manages its own caches
      # v9 of the action runs golangci-lint v2, matching .golangci.yml (version: "2").
      - uses: golangci/golangci-lint-action@db582008a42febd596419635a5abc9d9815daa9c # v9.2.1
        with:
          version: v2.12.2
          # Scope linting to first-party Go packages to avoid vendor-like code under web/.
          args: --timeout=5m ./cmd/... ./internal/...

  vuln:
    name: govulncheck (reachable CVEs)
    runs-on: ubuntu-latest
    steps:
      # This action checks out the repo itself (repo-checkout defaults to true).
      - uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1.0.4
        with:
          go-version-file: go.mod
          go-package: ./...

  sast-codeql:
    name: CodeQL (Go)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: github/codeql-action/init@1a818fd5f97ed0ee9a823421bd5b171add01227f # v4.36.2
        with:
          languages: go
      - uses: github/codeql-action/autobuild@1a818fd5f97ed0ee9a823421bd5b171add01227f # v4.36.2
      - uses: github/codeql-action/analyze@1a818fd5f97ed0ee9a823421bd5b171add01227f # v4.36.2
        with:
          category: "/language:go"

  semgrep:
    name: semgrep (SAST)
    runs-on: ubuntu-latest
    # Run in the official semgrep image, pinned by digest (semgrep/semgrep:latest @ 2026-06).
    container:
      image: semgrep/semgrep@sha256:c180f0c93a17b420c0af5006214a29d3c747c5459c732b740191adf657dd0068
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      # OSS registry rulesets; --error makes findings fail the job.
      - run: semgrep scan --config p/default --config p/golang --error

  secrets:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 0 # full history so gitleaks scans every commit
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE only required for GitHub Organizations, not personal repos.

  sbom:
    name: SBOM (syft)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false # we upload it explicitly below
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom.spdx.json

  web:
    name: web (eslint + typecheck + build + audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm audit --audit-level=high

  docker-scan:
    name: Trivy (image scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - run: docker build -f deploy/Dockerfile -t secure-vault:ci .
      - uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: secure-vault:ci
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          format: table
